name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          set -o pipefail
          npm install
          npm run build 2>&1 | tee build.log || (git config --global user.name "Actions Bot" && git config --global user.email "bot@github.com" && git checkout -b debug-build-failure && git add build.log && git commit -m "debug build failure logs" && git push origin debug-build-failure --force && exit 1)

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
